<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>책가 — 고전 문학 요약</title>
    <script>
      const path = window.location.pathname;
      const search = window.location.search;
      const hash = window.location.hash;
      const redirect = path.slice(1).split('/').slice(1).join('/');
      window.location.replace(
        '/' + 'chaekga' + '/?p=' +
        redirect + (search ? '&q=' + search.slice(1) : '') + hash
      );
    </script>
  </head>
  <body></body>
</html>
